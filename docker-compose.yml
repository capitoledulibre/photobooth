version: '3'

services:
    django:
        build: .
        environment:
        - DJANGO_SETTINGS_MODULE=photobooth.settings.production
        - DJANGO_DATABASE_PASSWORD
        volumes:
        - media:/srv/app/media
        ports:
        - 8005:8000
        restart: unless-stopped
    celery:
        build: .
        command: ["/srv/app/deploy/run-celery.sh"]
        environment:
        - DJANGO_SETTINGS_MODULE=photobooth.settings.production
        - DJANGO_DATABASE_PASSWORD
        volumes:
        - media:/srv/app/media
        - ./ssh:/home/daemon/.ssh
        restart: unless-stopped
    rabbitmq:
        image: rabbitmq
        restart: unless-stopped
    postgresql:
        image: postgres:18
        environment:
            - POSTGRES_USER=photobooth_user
            - POSTGRES_PASSWORD=password
            - POSTGRES_DB=photobooth
        restart: unless-stopped

volumes:
  media: {}
